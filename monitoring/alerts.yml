groups:
  - name: todo-app-alerts
    rules:
      - alert: AppDown
        expr: up{job="todo-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "To-do app is down"
          description: "Prometheus has not been able to scrape the app for 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(todo_app_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(todo_app_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 5xx error rate"
          description: "More than 5% of requests have returned 5xx over the last 5 minutes."
